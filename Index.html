<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>HINT</title>
<style>
  :root{
    --ink:#000000;--line:#5a5a5a;--text:#b8b3a8;--text-dim:#6e6a62;
    --accent:#a8743f;--key-line:#3a3a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--ink);color:var(--text);
    font-family:"Helvetica Neue",-apple-system,sans-serif;
    display:flex;flex-direction:column;height:100dvh;
    overflow:hidden;user-select:none;letter-spacing:0.02em;
  }
  .screen{
    flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;text-align:center;position:relative;
  }
  .screen.active{display:flex;}

  /* LP */
  .lp-wrap{position:relative;width:200px;height:200px;margin-bottom:40px;}
  .lp{width:100%;height:100%;border-radius:50%;border:1px solid var(--line);
    position:relative;animation:spin 8s linear infinite;animation-play-state:paused;}
  .lp.spinning{animation-play-state:running;}
  .groove{position:absolute;border-radius:50%;border:1px solid #2a2a2a;
    top:50%;left:50%;transform:translate(-50%,-50%);}
  .g1{width:88%;height:88%;}.g2{width:72%;height:72%;}.g3{width:56%;height:56%;}
  .label-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:34%;height:34%;border-radius:50%;border:1px solid var(--accent);
    overflow:hidden;background:#1a1a1a;}
  .poster{width:100%;height:100%;object-fit:cover;display:block;opacity:0.82;filter:brightness(0.78);}
  .spindle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:6px;height:6px;border-radius:50%;background:var(--text-dim);z-index:2;}
  .index-dot{position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:3px;height:3px;border-radius:50%;background:var(--accent);}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 테마 선택 */
  .title-sm{font-size:12px;color:var(--text-dim);letter-spacing:0.3em;
    text-transform:uppercase;margin-bottom:28px;}
  .theme-list{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;}
  .theme-btn{border:1px solid var(--key-line);background:transparent;color:var(--text);
    font-size:18px;font-weight:300;padding:20px;border-radius:14px;letter-spacing:0.05em;
    transition:border-color .15s,color .15s;}
  .theme-btn:active{border-color:var(--accent);color:var(--accent);}

  /* 코드 입력 */
  .prompt{font-size:13px;color:var(--text-dim);letter-spacing:0.25em;
    text-transform:uppercase;margin-bottom:18px;}
  .code-display{font-size:34px;font-weight:300;letter-spacing:0.4em;min-height:46px;
    color:var(--text);margin-bottom:36px;padding-left:0.4em;}
  .code-display .ph{color:#3a3a3a;}
  .keypad{display:grid;grid-template-columns:repeat(3,72px);gap:18px;justify-content:center;}
  .key{width:72px;height:72px;border-radius:50%;border:1px solid var(--key-line);
    background:transparent;color:var(--text);font-size:24px;font-weight:300;
    display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;}
  .key:active{border-color:var(--accent);color:var(--accent);}
  .key.fn{font-size:13px;letter-spacing:0.1em;color:var(--text-dim);border-color:transparent;}
  .key.fn:active{color:var(--accent);}

  /* 진행률 */
  .stage-label{font-size:12px;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--accent);margin-bottom:28px;}
  .ring-wrap{position:relative;width:180px;height:180px;margin-bottom:8px;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:#262626;stroke-width:3;}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;
    transition:stroke-dashoffset 1.1s ease;}
  .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;}
  .ring-pct{font-size:40px;font-weight:300;color:var(--text);line-height:1;}
  .ring-sub{font-size:11px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:8px;}
  .time-row{margin-top:30px;}
  .time-val{font-size:24px;font-weight:300;color:var(--text);letter-spacing:0.05em;}
  .time-cap{font-size:11px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:8px;}

  /* 가이드/정답 */
  .content-code{font-size:13px;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:24px;}
  .content-body{font-size:21px;line-height:1.85;font-weight:300;max-width:520px;color:var(--text);}
  .actions{display:flex;gap:14px;margin-top:48px;flex-wrap:wrap;justify-content:center;}
  .btn{border:1px solid var(--key-line);background:transparent;color:var(--text);
    font-size:15px;font-weight:300;padding:14px 28px;border-radius:40px;letter-spacing:0.05em;
    transition:border-color .15s,color .15s;}
  .btn:active{border-color:var(--accent);color:var(--accent);}
  .btn.primary{border-color:var(--accent);color:var(--accent);}
  .err{color:#9a5a4a;font-size:14px;height:18px;margin-top:14px;letter-spacing:0.05em;}

  .counter{position:absolute;top:18px;right:20px;font-size:12px;color:var(--text-dim);letter-spacing:0.15em;}
  .counter b{color:var(--accent);font-weight:400;}
  .theme-name-top{position:absolute;top:18px;left:20px;font-size:12px;color:var(--text-dim);letter-spacing:0.15em;}

  .reset-msg{font-size:19px;font-weight:300;line-height:1.7;color:var(--text);max-width:420px;margin-bottom:8px;}
  .reset-num{font-size:13px;color:var(--text-dim);letter-spacing:0.2em;margin-top:14px;}

  /* 로딩/상태 */
  .status{font-size:13px;color:var(--text-dim);letter-spacing:0.1em;margin-top:24px;min-height:18px;}
  .offline-tag{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    font-size:11px;color:var(--text-dim);letter-spacing:0.15em;opacity:0.7;}
  .spin-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    border:1px solid var(--accent);border-top-color:transparent;animation:spin 0.8s linear infinite;vertical-align:middle;}
</style>
</head>
<body>

<!-- 0. 로딩 -->
<div class="screen active" id="screen-loading">
  <div class="lp-wrap"><div class="lp spinning">
    <div class="index-dot"></div>
    <div class="groove g1"></div><div class="groove g2"></div><div class="groove g3"></div>
    <div class="label-ring"></div><div class="spindle"></div>
  </div></div>
  <div class="status" id="loadStatus"><span class="spin-dot"></span> 힌트를 불러오는 중</div>
</div>

<!-- 1. 테마 선택 -->
<div class="screen" id="screen-theme">
  <div class="title-sm">테마를 선택하세요</div>
  <div class="theme-list" id="themeList"></div>
  <div class="offline-tag" id="offlineTag"></div>
</div>

<!-- 2. 코드 입력 -->
<div class="screen" id="screen-input">
  <div class="theme-name-top" id="themeNameTop"></div>
  <div class="counter">힌트 <b id="cntNum">0</b>회</div>
  <div class="lp-wrap"><div class="lp" id="lp">
    <div class="index-dot"></div>
    <div class="groove g1"></div><div class="groove g2"></div><div class="groove g3"></div>
    <div class="label-ring"><img class="poster" id="posterImg" src="" alt="" onerror="this.style.display='none'"></div>
    <div class="spindle"></div>
  </div></div>
  <div class="prompt">code</div>
  <div class="code-display" id="codeDisplay"><span class="ph">····</span></div>
  <div class="keypad">
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key fn" data-k="del">지움</button><button class="key" data-k="0">0</button><button class="key fn" data-k="ok">확인</button>
  </div>
  <div class="err" id="err"></div>
</div>

<!-- 3. 진행률 -->
<div class="screen" id="screen-progress">
  <div class="stage-label">progress</div>
  <div class="ring-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle class="ring-bg" cx="90" cy="90" r="84"/>
      <circle class="ring-fg" id="ringFg" cx="90" cy="90" r="84"/>
    </svg>
    <div class="ring-center">
      <div class="ring-pct" id="progPct">0%</div>
      <div class="ring-sub">진행률</div>
    </div>
  </div>
  <div class="time-row">
    <div class="time-val" id="progTime">--</div>
    <div class="time-cap">예상 남은 시간</div>
  </div>
  <div class="actions">
    <button class="btn" onclick="goInput()">처음으로</button>
    <button class="btn primary" onclick="show('screen-hint')">가이드 보기</button>
  </div>
</div>

<!-- 4. 가이드 -->
<div class="screen" id="screen-hint">
  <div class="stage-label">guide</div>
  <div class="content-code" id="hintCode"></div>
  <div class="content-body" id="hintBody"></div>
  <div class="actions">
    <button class="btn" onclick="goInput()">처음으로</button>
    <button class="btn primary" onclick="show('screen-answer')">정답 보기</button>
  </div>
</div>

<!-- 5. 정답 -->
<div class="screen" id="screen-answer">
  <div class="stage-label">answer</div>
  <div class="content-code" id="ansCode"></div>
  <div class="content-body" id="ansBody"></div>
  <div class="actions">
    <button class="btn primary" onclick="goInput()">처음으로</button>
  </div>
</div>

<!-- 6. 직원 리셋 -->
<div class="screen" id="screen-reset">
  <div class="stage-label">staff</div>
  <div class="reset-msg">초기화하고 테마 선택으로 돌아갈까요?</div>
  <div class="reset-num">힌트 <span id="resetCnt">0</span>회 기록됨</div>
  <div class="actions">
    <button class="btn" onclick="goInput()">취소</button>
    <button class="btn primary" onclick="doReset()">초기화</button>
  </div>
</div>

<script>
// ===================================================================
// 설정: 앱스크립트 웹앱 URL (배포한 /exec 주소)
// ===================================================================
const API_URL = "https://script.google.com/macros/s/AKfycbxYMYCv6ovP1xd37PjRDMw2vSwt1dHwrRxwD37tSrQeGahxSSxO3hQv8st9VRIr8ceO8Q/exec";
const CACHE_KEY = "hintphone_data_v1";

let DATA = null;          // { themes:[...], staffCode }
let curTheme = null;      // 선택된 테마 객체
let code = "";
let hintCount = 0;

const $ = id => document.getElementById(id);

// ---- 데이터 로드: 네트워크 우선, 실패 시 캐시 ----
async function loadData(){
  let fromCache = false;
  try{
    const res = await fetch(API_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("net");
    DATA = await res.json();
    // 받아온 데이터를 기기에 저장 (오프라인 대비)
    try{ localStorage.setItem(CACHE_KEY, JSON.stringify(DATA)); }catch(e){}
  }catch(e){
    // 네트워크 실패 → 저장해둔 데이터 사용
    const cached = localStorage.getItem(CACHE_KEY);
    if(cached){ DATA = JSON.parse(cached); fromCache = true; }
  }

  if(!DATA){
    $('loadStatus').innerHTML = "힌트를 불러오지 못했습니다.<br>와이파이가 되는 곳에서 한 번 열어 주세요.";
    return;
  }
  buildThemeList();
  $('offlineTag').textContent = fromCache ? "저장된 데이터 (오프라인)" : "";
  show('screen-theme');
}

// ---- 테마 선택 화면 ----
function buildThemeList(){
  const list = $('themeList');
  list.innerHTML = "";
  DATA.themes.forEach((t, idx)=>{
    const b = document.createElement('button');
    b.className = "theme-btn";
    b.textContent = t.name;
    b.onclick = ()=>selectTheme(idx);
    list.appendChild(b);
  });
}

function selectTheme(idx){
  curTheme = DATA.themes[idx];
  $('themeNameTop').textContent = curTheme.name;
  // 포스터
  const pim = $('posterImg');
  if(curTheme.poster){ pim.src = curTheme.poster; pim.style.display="block"; }
  else { pim.style.display="none"; }
  code = ""; render();
  show('screen-input');
}

// ---- 코드 입력 ----
function render(){
  if(code.length===0){ $('codeDisplay').innerHTML='<span class="ph">····</span>'; }
  else{ const dots='·'.repeat(Math.max(0,4-code.length));
    $('codeDisplay').innerHTML=code+'<span class="ph">'+dots+'</span>'; }
}

document.querySelectorAll('#screen-input .key').forEach(k=>{
  k.addEventListener('click',()=>{
    const v=k.dataset.k; $('err').textContent='';
    if(v==='del'){ code=code.slice(0,-1); }
    else if(v==='ok'){ submit(); return; }
    else { if(code.length<6) code+=v; }
    const lp=$('lp'); lp.classList.add('spinning');
    clearTimeout(window._lpt);
    window._lpt=setTimeout(()=>lp.classList.remove('spinning'),1200);
    render();
  });
});

function submit(){
  if(code.length===0) return;
  // 직원 코드 → 리셋(테마 선택 복귀)
  if(code === (DATA.staffCode||"").toString()){
    $('resetCnt').textContent = hintCount;
    code=""; render();
    show('screen-reset');
    return;
  }
  const e = curTheme.hints.find(h=>h.code===code);
  if(!e){ $('err').textContent='없는 코드입니다'; code=""; render(); return; }

  hintCount++;
  $('cntNum').textContent = hintCount;

  $('progPct').textContent = (e.progress||0)+'%';
  $('progTime').textContent = formatRemain(e.remain);
  const R=84, CIRC=2*Math.PI*R;
  const ringFg=$('ringFg');
  ringFg.style.strokeDasharray=CIRC;
  ringFg.style.strokeDashoffset=CIRC;

  $('hintCode').textContent = code;
  $('hintBody').textContent = e.hint;
  $('ansCode').textContent = code;
  $('ansBody').textContent = e.answer;

  show('screen-progress');
  setTimeout(()=>{ ringFg.style.strokeDashoffset=CIRC*(1-(e.progress||0)/100); },150);
}

// "60" 처럼 숫자만 있으면 "분" 붙임. "25분"이면 그대로.
function formatRemain(v){
  v=(v||"").toString().trim();
  if(v==="") return "--";
  if(/^\d+$/.test(v)) return v+"분";
  return v;
}

function doReset(){
  hintCount=0;
  $('cntNum').textContent=hintCount;
  code=""; render();
  show('screen-theme');   // 테마 선택 화면으로 복귀
}

function goInput(){ code=""; render(); show('screen-input'); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

loadData();
</script>
</body>
</html>
